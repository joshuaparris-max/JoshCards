<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>JoshCards — Card Catalogue</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>JoshCards</h1>
    <div class="hbtns">
      <button id="findBtn">Find by name</button>
      <button id="addBtn" class="primary">+ Scan / Add</button>
    </div>
  </header>

  <dialog id="findDialog">
    <form method="dialog" id="findForm">
      <h2>Find by name</h2>
      <label>Game
        <select id="find_game"></select>
      </label>
      <label>Card name
        <span class="nameRow">
          <input id="find_name" type="text" placeholder="Charizard, Lightning Bolt…" />
          <button type="button" id="findGoBtn" class="primary">Search</button>
        </span>
      </label>
      <div id="findStatus" class="status" hidden></div>
      <div id="findResults" class="results"></div>
      <div class="actions">
        <button type="button" id="findCloseBtn">Close</button>
      </div>
    </form>
  </dialog>

  <section id="controls">
    <input id="search" type="search" placeholder="Search name, tags, location…" />
    <select id="filterGame"><option value="">All games</option></select>
    <select id="filterTag"><option value="">All tags</option></select>
    <span id="count" class="count"></span>
  </section>

  <main id="grid" class="grid"></main>

  <!-- Add / edit dialog -->
  <dialog id="cardDialog">
    <form method="dialog" id="cardForm">
      <h2 id="dialogTitle">Add card</h2>

      <div class="capture">
        <video id="video" playsinline autoplay muted hidden></video>
        <img id="preview" alt="card preview" hidden />
        <canvas id="canvas" hidden></canvas>
        <div class="capRow">
          <button type="button" id="camBtn">Open camera</button>
          <button type="button" id="shotBtn" hidden>Capture</button>
          <label class="fileBtn">Photo / file
            <input id="fileInput" type="file" accept="image/*" capture="environment" hidden />
          </label>
        </div>
        <div id="scanStatus" class="status" hidden></div>
      </div>

      <label>Name
        <span class="nameRow">
          <input id="f_name" type="text" required />
          <button type="button" id="lookupBtn" title="Look up by name">Look up</button>
        </span>
      </label>
      <label>Game
        <select id="f_game"></select>
      </label>
      <label>Type / Colour <input id="f_type" type="text" placeholder="Fire, Blue, …" /></label>
      <label>Cost (energy / mana) <input id="f_cost" type="text" /></label>
      <label>Power / HP <input id="f_power" type="text" /></label>
      <label>Rarity / Brand <input id="f_rarity" type="text" /></label>
      <label>Quantity <input id="f_qty" type="number" min="1" value="1" /></label>
      <label>Storage location <input id="f_loc" type="text" placeholder="Box A, shelf…" /></label>
      <label>Tags
        <input id="f_tags" type="text" placeholder="holo, round-corners, foil…" />
      </label>
      <div id="tagChips" class="chips"></div>

      <div class="actions">
        <button type="button" id="deleteBtn" class="danger" hidden>Delete</button>
        <button type="button" id="cancelBtn">Cancel</button>
        <button type="button" id="saveBtn" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <footer>
    <button id="syncBtn">Sync</button>
    <button id="exportBtn">Export JSON</button>
    <label class="fileBtn small">Import JSON<input id="importInput" type="file" accept="application/json" hidden /></label>
  </footer>

  <dialog id="syncDialog">
    <form method="dialog" id="syncForm">
      <h2>Online sync</h2>
      <p class="hint">Paste your Supabase project URL and anon key to share one database
        across devices. Leave blank to stay local-only on this device.</p>
      <label>Supabase URL
        <input id="s_url" type="url" placeholder="https://xxxx.supabase.co" />
      </label>
      <label>Supabase anon key
        <input id="s_key" type="text" placeholder="eyJhbGci…" />
      </label>
      <div id="syncStatus" class="status" hidden></div>
      <div class="actions">
        <button type="button" id="syncTestBtn">Test &amp; sync now</button>
        <button type="button" id="syncSaveBtn" class="primary">Save</button>
        <button type="button" id="syncCloseBtn">Close</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
